<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国家轮廓背景 — 东京</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #fff; --text: #0f172a; --sub: #64748b; --div: #f1f5f9; }
  .dark { --bg: #020617; --text: #f1f5f9; --sub: #64748b; --div: #1e293b; }
  body { font-family: Inter, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
  .toggle { position: fixed; top: 12px; right: 16px; z-index: 100; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--div); background: var(--bg); color: var(--text); }

  .page { max-width: 672px; margin: 0 auto; padding: 24px 16px; position: relative; min-height: 100vh; overflow: hidden; }

  .country-bg {
    position: absolute;
    top: -10%;
    right: -20%;
    width: 130%;
    height: 120%;
    pointer-events: none;
    z-index: 0;
  }
  .country-bg svg { width: 100%; height: 100%; }

  .content { position: relative; z-index: 1; }

  .hero { padding-bottom: 16px; border-bottom: 1px solid var(--div); }
  .hero-top { display: flex; align-items: baseline; justify-content: space-between; }
  .hero h1 { font-size: 24px; font-weight: 900; }
  .hero .tz { font-size: 15px; font-weight: 600; }
  .hero .lang { font-size: 13px; color: var(--sub); margin-top: 2px; }
  .hero .intro { font-size: 15px; color: var(--sub); line-height: 1.6; margin-top: 12px; }

  .row { padding: 16px 0; border-bottom: 1px solid var(--div); }
  .row-head { display: flex; justify-content: space-between; align-items: baseline; }
  .row-title { font-size: 15px; font-weight: 800; }
  .row-rank { font-size: 13px; font-weight: 600; color: var(--sub); }
  .row-big { font-size: 45px; font-weight: 900; margin-top: 4px; }
  .row-sub { font-size: 13px; color: var(--sub); margin-top: 8px; display: flex; gap: 16px; flex-wrap: wrap; }
  .row-sub span { white-space: nowrap; }

  .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 100; background: var(--bg); padding: 8px 16px; border-radius: 12px; border: 1px solid var(--div); }
  .controls label { font-size: 12px; color: var(--sub); display: flex; align-items: center; gap: 6px; }
  .controls input[type="range"] { width: 80px; }
  .controls span { font-size: 11px; color: var(--sub); min-width: 30px; }
</style>
</head>
<body>
<button class="toggle" onclick="document.body.classList.toggle('dark'); updateBg()">Dark / Light</button>

<div class="page">
  <div class="country-bg" id="country-bg">
    <svg viewBox="0 0 100 200" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
      <!-- Japan simplified outline: long archipelago, north to south -->
      <path id="country-path" d="
        M 55 8 L 60 10 63 14 62 20 58 26 55 30 52 28 48 24 45 20 44 15 47 10 51 8 Z
        M 50 32 L 54 30 58 32 60 36 58 42 55 48 52 52 50 56 48 60 46 64 43 68 40 72
        38 76 36 80 34 84 32 88 30 92 28 96 27 100 28 104 30 108 33 110
        36 108 38 104 40 100 42 96 44 92 46 88 48 84 50 80 52 76 53 72
        54 68 56 64 57 60 58 56 57 52 55 48 52 44 50 40 48 36 Z
        M 32 112 L 36 114 40 118 42 124 40 130 37 134 33 136 30 132 28 126 27 120 28 116 Z
        M 38 138 L 42 136 46 140 48 146 50 152 48 158 45 162 42 166 38 168
        35 170 32 168 30 164 28 160 27 155 28 150 30 145 33 140 Z
      " fill="#94a3b8" opacity="0.08" />
    </svg>
  </div>
  
  <div class="content">
    <div class="hero">
      <div class="hero-top">
        <h1>🇯🇵 东京</h1>
        <span class="tz">UTC+9 · 22:30</span>
      </div>
      <p class="lang">日语</p>
      <p class="intro">安全指数近 90，医疗和治理评分同样优秀，同级城市中租金偏低。日常生活依赖日语。夏季均温 27°C、高湿，AQI 42，四季分明。</p>
    </div>

    <div class="row">
      <div class="row-head">
        <span class="row-title">税后年薪</span>
        <span class="row-rank">#18 / 150</span>
      </div>
      <div class="row-big">$71,200</div>
      <div class="row-sub">
        <span>税前 $94,000</span>
        <span>税率 ~24.3%</span>
      </div>
    </div>

    <div class="row">
      <div class="row-head">
        <span class="row-title">基本保障</span>
        <span class="row-rank">#3 / 150</span>
      </div>
      <div style="display:flex;gap:24px;margin-top:8px">
        <div>
          <div style="font-size:45px;font-weight:900;color:#16a34a">89.7</div>
          <div style="font-size:13px;color:var(--sub)">安全</div>
        </div>
        <div>
          <div style="font-size:45px;font-weight:900;color:#16a34a">86.3</div>
          <div style="font-size:13px;color:var(--sub)">医疗</div>
        </div>
        <div>
          <div style="font-size:45px;font-weight:900;color:#16a34a">82.1</div>
          <div style="font-size:13px;color:var(--sub)">治理</div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="row-head">
        <span class="row-title">住房</span>
        <span class="row-rank">#45 / 150</span>
      </div>
      <div style="font-size:30px;font-weight:900;margin-top:4px">$1,100 <span style="font-size:14px;font-weight:400;color:var(--sub)">/月</span></div>
    </div>

    <div class="row">
      <div class="row-head">
        <span class="row-title">生活压力</span>
        <span class="row-rank">#22 / 150</span>
      </div>
      <div style="font-size:30px;font-weight:900;margin-top:4px">38.5</div>
    </div>

    <div class="row">
      <div class="row-head">
        <span class="row-title">月消费（中等）</span>
        <span class="row-rank">#68 / 150</span>
      </div>
      <div style="font-size:30px;font-weight:900;margin-top:4px">$3,200</div>
    </div>

    <div class="row">
      <div class="row-head"><span class="row-title">工作</span></div>
      <div class="row-sub" style="margin-top:8px">
        <span>年工时 1,607h</span>
        <span>带薪假 10 天</span>
      </div>
    </div>

    <div class="row">
      <div class="row-head"><span class="row-title">环境</span></div>
      <div class="row-sub" style="margin-top:8px">
        <span>AQI 42</span>
        <span>日照 1,877h</span>
        <span>自由度 78.2</span>
      </div>
    </div>

    <div style="height:200px"></div>
  </div>
</div>

<div class="controls">
  <label>
    透明度
    <input type="range" id="opacity-slider" min="1" max="20" value="8" oninput="updateBg()">
    <span id="opacity-val">0.08</span>
  </label>
  <label>
    大小
    <input type="range" id="size-slider" min="80" max="200" value="130" oninput="updateBg()">
    <span id="size-val">130%</span>
  </label>
  <label>
    偏移X
    <input type="range" id="x-slider" min="-60" max="40" value="-20" oninput="updateBg()">
    <span id="x-val">-20%</span>
  </label>
  <label>
    偏移Y
    <input type="range" id="y-slider" min="-40" max="40" value="-10" oninput="updateBg()">
    <span id="y-val">-10%</span>
  </label>
</div>

<script>
function updateBg() {
  const opacity = document.getElementById('opacity-slider').value / 100;
  const size = document.getElementById('size-slider').value;
  const x = document.getElementById('x-slider').value;
  const y = document.getElementById('y-slider').value;
  const isDark = document.body.classList.contains('dark');
  
  const bg = document.getElementById('country-bg');
  bg.style.width = size + '%';
  bg.style.right = x + '%';
  bg.style.top = y + '%';
  
  const path = document.getElementById('country-path');
  path.setAttribute('opacity', opacity);
  path.setAttribute('fill', isDark ? '#f1f5f9' : '#94a3b8');
}
</script>
</body>
</html>
