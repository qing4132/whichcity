name: Update Exchange Rates

on:
  schedule:
    # Every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest exchange rates
        env:
          EXCHANGE_RATE_API_KEY: ${{ secrets.EXCHANGE_RATE_API_KEY }}
        run: node scripts/update-rates.mjs

      - name: Commit & push if changed
        run: |
          git diff --quiet public/data/exchange-rates.json && echo "No changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/exchange-rates.json
          git commit -m "chore: auto-update exchange rates [skip ci]"
          git push
